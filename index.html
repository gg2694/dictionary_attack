<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Fireworks</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(236, 72, 153, 0.35), transparent 32%),
        radial-gradient(circle at 80% 10%, rgba(56, 189, 248, 0.35), transparent 28%),
        radial-gradient(circle at 50% 90%, rgba(168, 85, 247, 0.38), transparent 34%),
        #070712;
      color: white;
      overflow: hidden;
      transition: background 0.7s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.06), transparent 40%, rgba(255, 255, 255, 0.04)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 90px);
      pointer-events: none;
      animation: shimmer 8s ease-in-out infinite alternate;
    }

    body.success {
      background:
        radial-gradient(circle at 18% 20%, rgba(132, 204, 22, 0.9), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(20, 184, 166, 0.85), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(16, 185, 129, 0.78), transparent 32%),
        radial-gradient(circle at 50% 50%, rgba(34, 197, 94, 0.95), transparent 48%),
        #022c22;
      animation: successPulse 1.4s ease-in-out infinite alternate;
    }

    body.error-flash {
      animation: flashRed 0.85s ease-in-out;
    }

    @keyframes shimmer {
      from {
        opacity: 0.65;
        transform: translateX(-16px);
      }
      to {
        opacity: 1;
        transform: translateX(16px);
      }
    }

    @keyframes successPulse {
      from {
        filter: saturate(1.1) brightness(1);
      }
      to {
        filter: saturate(1.65) brightness(1.18);
      }
    }

    @keyframes flashRed {
      0% {
        background-color: #070712;
        filter: none;
      }
      35% {
        background-color: #991b1b;
        filter: saturate(1.4);
      }
      100% {
        background-color: #070712;
        filter: none;
      }
    }

    .card {
      position: relative;
      width: min(90vw, 430px);
      padding: 38px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.07));
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(18px);
      text-align: center;
      z-index: 2;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, rgba(236, 72, 153, 0.55), rgba(56, 189, 248, 0.3), rgba(168, 85, 247, 0.55));
      opacity: 0.28;
      z-index: -1;
      filter: blur(24px);
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(20px, 5vw, 30px);
      line-height: 1;
      letter-spacing: -0.04em;
      text-shadow: 0 12px 40px rgba(236, 72, 153, 0.25);
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 16px;
      font-size: 17px;
      color: white;
      outline: none;
      margin-bottom: 14px;
      background: rgba(0, 0, 0, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: border 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.48);
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.58);
      box-shadow: 0 0 0 5px rgba(236, 72, 153, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      padding: 15px 16px;
      border: 0;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #120718;
      background: linear-gradient(135deg, #ffffff, #f5d0fe 45%, #bae6fd);
      box-shadow: 0 18px 42px rgba(236, 72, 153, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.9);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 54px rgba(236, 72, 153, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      min-height: 24px;
      margin-top: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .firework,
    .confetti,
    .beam,
    .orb,
    .shockwave {
      position: fixed;
      pointer-events: none;
      z-index: 1;
    }

    .firework {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      box-shadow: 0 0 18px currentColor;
      animation: explode 1000ms ease-out forwards;
    }

    .confetti {
      width: 10px;
      height: 16px;
      border-radius: 3px;
      animation: confettiFall var(--duration) linear forwards;
    }

    .beam {
      width: 3px;
      height: 55vh;
      bottom: -8vh;
      transform-origin: bottom center;
      border-radius: 999px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0), currentColor, rgba(255, 255, 255, 0));
      filter: blur(0.3px);
      animation: beamFlash 900ms ease-out forwards;
    }

    .orb {
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 30px currentColor, 0 0 70px currentColor;
      animation: orbFloat var(--duration) ease-out forwards;
    }

    .shockwave {
      left: 50%;
      top: 50%;
      width: 30px;
      height: 30px;
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-radius: 999px;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 45px rgba(255, 255, 255, 0.7);
      animation: shockwave 1100ms ease-out forwards;
    }

    @keyframes explode {
      0% {
        transform: translate(0, 0) scale(1.6);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(0.08);
        opacity: 0;
      }
    }

    @keyframes confettiFall {
      0% {
        transform: translate(0, -20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), 110vh) rotate(var(--rotation));
        opacity: 0;
      }
    }

    @keyframes beamFlash {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) scaleY(0.2);
      }
      30% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle)) scaleY(1.25);
      }
    }

    @keyframes orbFloat {
      0% {
        transform: translate(0, 0) scale(0.2);
        opacity: 0;
      }
      15% {
        opacity: 0.95;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.2);
        opacity: 0;
      }
    }

    @keyframes shockwave {
      0% {
        width: 30px;
        height: 30px;
        opacity: 1;
      }
      100% {
        width: 150vw;
        height: 150vw;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Password</h1>
    <form id="passwordForm">
      <input id="passwordInput" type="password" placeholder="Enter your password" autocomplete="off" autofocus />
      <button type="submit">Submit</button>
    </form>
    <div id="message" class="message" aria-live="polite"></div>
  </main>

  <script>
    const form = document.getElementById("passwordForm");
    const input = document.getElementById("passwordInput");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      if (input.value === "default") {
        document.body.classList.remove("error-flash");
        document.body.classList.add("success");
        message.textContent = "Correct password!";
        launchEffects();
      } else {
        document.body.classList.remove("success");
        flashRedBackground();
        message.textContent = "Wrong password.";
      }

      input.value = "";
      input.focus();
    });

    function flashRedBackground() {
      document.body.classList.remove("error-flash");
      void document.body.offsetWidth;
      document.body.classList.add("error-flash");
    }

    function launchEffects() {
      const card = document.querySelector(".card");

      card.animate(
        [
          { transform: "scale(1) rotate(0deg)", filter: "brightness(1)" },
          { transform: "scale(1.08) rotate(-1deg)", filter: "brightness(1.45)" },
          { transform: "scale(1.03) rotate(1deg)", filter: "brightness(1.25)" },
          { transform: "scale(1) rotate(0deg)", filter: "brightness(1)" }
        ],
        { duration: 1250, easing: "cubic-bezier(.2,.9,.2,1)" }
      );

      for (let i = 0; i < 8; i++) {
        setTimeout(createShockwave, i * 100);
      }

      for (let i = 0; i < 50; i++) {
        setTimeout(createBeam, i * 55);
      }

      for (let burst = 0; burst < 86; burst++) {
        setTimeout(function() {
          createBurst(
            randomBetween(35, window.innerWidth - 35),
            randomBetween(45, window.innerHeight * 0.72)
          );
        }, burst * 110);
      }

      for (let i = 0; i < 400; i++) {
        setTimeout(createConfetti, i * 10);
      }

      for (let i = 0; i < 200; i++) {
        setTimeout(createOrb, i * 32);
      }

      for (let i = 0; i < 260; i++) {
        setTimeout(createSparkleRain, i * 26);
      }
    }

    function createShockwave() {
      const wave = document.createElement("div");
      wave.className = "shockwave";
      document.body.appendChild(wave);
      wave.addEventListener("animationend", function() {
        wave.remove();
      });
    }

    function createBeam() {
      const colors = ["#ffffff", "#bbf7d0", "#86efac", "#4ade80", "#22c55e", "#14b8a6"];
      const beam = document.createElement("div");
      beam.className = "beam";
      beam.style.left = randomBetween(0, window.innerWidth) + "px";
      beam.style.color = colors[Math.floor(Math.random() * colors.length)];
      beam.style.setProperty("--angle", randomBetween(-35, 35) + "deg");
      document.body.appendChild(beam);
      beam.addEventListener("animationend", function() {
        beam.remove();
      });
    }

    function createConfetti() {
      const colors = ["#ffffff", "#dcfce7", "#bbf7d0", "#86efac", "#4ade80", "#22c55e", "#14b8a6"];
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = randomBetween(0, window.innerWidth) + "px";
      confetti.style.top = "-30px";
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.setProperty("--x", randomBetween(-220, 220) + "px");
      confetti.style.setProperty("--rotation", randomBetween(360, 1440) + "deg");
      confetti.style.setProperty("--duration", randomBetween(3000, 6200) + "ms");
      document.body.appendChild(confetti);
      confetti.addEventListener("animationend", function() {
        confetti.remove();
      });
    }

    function createOrb() {
      const colors = ["#ffffff", "#bbf7d0", "#86efac", "#4ade80", "#22c55e", "#14b8a6"];
      const orb = document.createElement("div");
      orb.className = "orb";
      orb.style.left = randomBetween(0, window.innerWidth) + "px";
      orb.style.top = randomBetween(window.innerHeight * 0.55, window.innerHeight) + "px";
      orb.style.color = colors[Math.floor(Math.random() * colors.length)];
      orb.style.setProperty("--size", randomBetween(8, 24) + "px");
      orb.style.setProperty("--x", randomBetween(-160, 160) + "px");
      orb.style.setProperty("--y", randomBetween(-420, -120) + "px");
      orb.style.setProperty("--duration", randomBetween(2200, 4600) + "ms");
      document.body.appendChild(orb);
      orb.addEventListener("animationend", function() {
        orb.remove();
      });
    }

    function createBurst(originX, originY) {
      const colors = ["#ffffff", "#dcfce7", "#bbf7d0", "#86efac", "#4ade80", "#22c55e", "#14b8a6"]; 
      const particles = 56;

      for (let i = 0; i < particles; i++) {
        const particle = document.createElement("div");
        const angle = (Math.PI * 2 * i) / particles;
        const distance = randomBetween(80, 230);
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        particle.className = "firework";
        particle.style.left = originX + "px";
        particle.style.top = originY + "px";
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.color = particle.style.background;
        particle.style.setProperty("--x", x + "px");
        particle.style.setProperty("--y", y + "px");

        document.body.appendChild(particle);
        particle.addEventListener("animationend", function() {
          particle.remove();
        });
      }
    }

    function createSparkleRain() {
      const sparkle = document.createElement("div");
      const size = randomBetween(3, 9);
      const x = randomBetween(0, window.innerWidth);
      const drift = randomBetween(-80, 80);
      const colors = ["#ffffff", "#dcfce7", "#bbf7d0", "#86efac", "#4ade80", "#14b8a6"]; 

      sparkle.className = "firework";
      sparkle.style.left = x + "px";
      sparkle.style.top = "-12px";
      sparkle.style.width = size + "px";
      sparkle.style.height = size + "px";
      sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
      sparkle.style.color = sparkle.style.background;
      sparkle.style.setProperty("--x", drift + "px");
      sparkle.style.setProperty("--y", window.innerHeight + 40 + "px");
      sparkle.style.animationDuration = randomBetween(2400, 5200) + "ms";

      document.body.appendChild(sparkle);
      sparkle.addEventListener("animationend", function() {
        sparkle.remove();
      });
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }
  </script>
</body>
</html>
